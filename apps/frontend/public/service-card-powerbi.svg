  <rect x="540" y="270" width="64" height="276" rx="14" fill="url(#gold)" opacity="0.95"/>
  <rect x="620" y="330" width="64" height="216" rx="14" fill="#1F1F23" stroke="#2A2A31" stroke-width="2"/>

  <!-- Trend line -->
  <path d="M220 338C308 300 370 320 444 280C520 240 576 252 640 230C714 206 772 218 860 170"
