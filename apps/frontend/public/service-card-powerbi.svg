<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="80" x2="1040" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0B0F"/>
      <stop offset="1" stop-color="#18181B"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F2BC6B"/>
      <stop offset="1" stop-color="#DF9830"/>
    </linearGradient>
    <filter id="shadow" x="-50" y="-50" width="1300" height="820" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect x="60" y="60" width="1080" height="600" rx="28" fill="url(#bg)" stroke="#2A2A31" stroke-width="2"/>

  <g filter="url(#shadow)">
    <rect x="140" y="132" width="920" height="456" rx="24" fill="#0F0F15" stroke="#2A2A31" stroke-width="2"/>
  </g>

  <!-- Title -->
  <rect x="180" y="170" width="220" height="14" rx="7" fill="#B8B8C0" opacity="0.45"/>
  <rect x="180" y="196" width="320" height="10" rx="5" fill="#B8B8C0" opacity="0.22"/>

  <!-- Bars -->
  <rect x="220" y="454" width="64" height="92" rx="14" fill="#1F1F23" stroke="#2A2A31" stroke-width="2"/>
  <rect x="300" y="402" width="64" height="144" rx="14" fill="#1F1F23" stroke="#2A2A31" stroke-width="2"/>
  <rect x="380" y="358" width="64" height="188" rx="14" fill="#1F1F23" stroke="#2A2A31" stroke-width="2"/>
