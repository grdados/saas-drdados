  <circle cx="540" cy="270" r="10" fill="#DF9830"/>
  <circle cx="860" cy="170" r="10" fill="#DF9830"/>

  <!-- Right cards -->
  <rect x="760" y="246" width="270" height="120" rx="20" fill="#121219" stroke="#2A2A31" stroke-width="2"/>
  <rect x="790" y="274" width="120" height="10" rx="5" fill="#B8B8C0" opacity="0.35"/>
  <rect x="790" y="296" width="190" height="18" rx="9" fill="url(#gold)" opacity="0.85"/>
  <rect x="790" y="328" width="140" height="10" rx="5" fill="#B8B8C0" opacity="0.22"/>

  <rect x="760" y="392" width="270" height="120" rx="20" fill="#121219" stroke="#2A2A31" stroke-width="2"/>
  <rect x="790" y="420" width="160" height="10" rx="5" fill="#B8B8C0" opacity="0.35"/>
  <rect x="790" y="444" width="90" height="18" rx="9" fill="url(#gold)" opacity="0.65"/>
  <rect x="790" y="476" width="190" height="10" rx="5" fill="#B8B8C0" opacity="0.22"/>
