services:
  - type: web
    name: grdados-backend
    runtime: docker
    rootDir: apps/backend
    plan: starter
    healthCheckPath: /api/health/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: FORCE_SSL_REDIRECT
        value: "1"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://grdados.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://grdados.vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: grdados-postgres
          property: connectionString
      - key: ASAAS_API_URL
        value: "https://api-sandbox.asaas.com/v3"
      - key: ASAAS_API_KEY
        sync: false
      - key: ASAAS_WEBHOOK_TOKEN
        sync: false

databases:
  - name: grdados-postgres
    plan: starter
    databaseName: grdados
    user: grdados
